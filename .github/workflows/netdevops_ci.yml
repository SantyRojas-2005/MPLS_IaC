name: NetDevOps CI - Auditoría Automatizada

on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  auditoria-terraform:
    name: 🏗️ Validación de Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar motor de Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Inicializar sin backend local y Validar HCL
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  auditoria-ansible:
    name: ⚙️ Validación de Sintaxis Ansible (Cisco IOS)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Instalar Ansible y Colecciones de Red
        run: |
          sudo apt update
          sudo apt install -y ansible
          ansible-galaxy collection install cisco.ios

      - name: Auditoría de Sintaxis en todos los Playbooks
        run: |
          cd ansible
          for playbook in *.yml; do
            echo "🔎 Auditando sintaxis de: $playbook"
            ansible-playbook -i inventario.ini "$playbook" --syntax-check
          done
